<!DOCTYPE html>

<html>
<head>
     <title>User Deletion Tool</title>  <!-- show in browser -->

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #f4f6f9;
    }

    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #2c2c2c;
        padding: 10px 20px; /*space between content and border of the box , top , right , bottom , left  */
        color: white;
    
    }

    /* Base size same */
    .navbar img {
        height: 45px;
        object-fit: contain;
    }

    /* Ericsson scaleup  */
    .logo-left {
        transform: scale(1.3);
    }

    /* Airtel normal */
    .logo-right {
        transform: scale(1);
    }

    .container {
        margin: 120px auto;
        width: 420px;
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        background: white;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    button {
        background: #007bff;
        color: white;
        border: none;
        padding: 10px 30px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }
</style>

</head>

<body>

<div class="navbar">
    <img src="{{ url_for('static', filename='ericsson.png') }}" class="logo-left">
    <div><b>User Management Tool</b></div>
    <img src="{{ url_for('static', filename='airtel1-removebg-preview.png') }}" class="logo-right">
</div>

<div class="container">
    <h2>Upload Excel for User Deletion</h2>

<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required><br><br>
    <button type="submit">Execute</button>
</form>

</div>

</body>
</html>
